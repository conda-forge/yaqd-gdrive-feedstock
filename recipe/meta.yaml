{% set name = "yaqd-gdrive" %}
{% set version = "2021.10.0" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 59ac6ddfd7e5c1ae82e4e9f6e376cf1ec28515712b3003c3dc82073f9d270fc8

build:
  number: 1
  noarch: python
  entry_points:
    - yaqd-gdrive = yaqd_gdrive._gdrive:GDrive.main
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
    - flit
    - aiohttp
    - yaqd-core >=2020.06.3
  run:
    - python >={{ python_min }}
    - aiohttp
    - yaqd-core >=2020.06.3

test:
  imports:
    - yaqd_gdrive
  commands:
    - pip check
    - yaqd-gdrive --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://yaq.fyi
  summary: Daemon interface for writing files to Google Drive
  dev_url: https://gitlab.com/yaq/yaqd-gdrive
  license: LGPL-3.0-only
  license_file: LICENSE

extra:
  recipe-maintainers:
    - untzag
    - ksunden
